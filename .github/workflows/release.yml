name: release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - internal/index/version.txt

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - id: resolve
        run: |
          # tr strips CRLF, trailing whitespace, blank lines, etc.
          VERSION=$(tr -d '[:space:]' < internal/index/version.txt)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::internal/index/version.txt ($VERSION) must be MAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  tag:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Create and push tag
        env:
          NEW_VERSION: ${{ needs.setup.outputs.version }}
        run: |
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

  create-release:
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ needs.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.tag.outputs.version }}
        run: |
          gh release create "$TAG" --title "scip-go $TAG" --generate-notes --draft --verify-tag

  binaries:
    needs: create-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            asset: scip-go-linux-amd64
          - runner: ubuntu-24.04-arm
            asset: scip-go-linux-arm64
          - runner: macos-latest
            asset: scip-go-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.create-release.outputs.version }}
      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Build
        run: nix build .#scip-go

      - name: Package
        run: |
          cp result/bin/scip-go .
          tar czf "${{ matrix.asset }}.tar.gz" scip-go LICENSE
          shasum -a 256 "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.tar.gz.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.create-release.outputs.version }}" \
            "${{ matrix.asset }}.tar.gz" \
            "${{ matrix.asset }}.tar.gz.sha256" \
            --clobber

  docker:
    needs: create-release
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.create-release.outputs.version }}
      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: nix build .#docker

      - name: Load and push arch-specific image
        run: |
          docker load < result
          VERSION="$(cat internal/index/version.txt)"
          ARCH_TAG="ghcr.io/scip-code/scip-go:v${VERSION}-${{ matrix.arch }}"
          docker tag "scip-go:$VERSION" "$ARCH_TAG"
          docker push "$ARCH_TAG"

  docker-manifest:
    needs: [create-release, docker]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.create-release.outputs.version }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          VERSION="$(cat internal/index/version.txt)"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
          AMD64="ghcr.io/scip-code/scip-go:v${VERSION}-amd64"
          ARM64="ghcr.io/scip-code/scip-go:v${VERSION}-arm64"
          for TAG in "v$VERSION" "v$MAJOR" "v$MINOR" "latest"; do
            docker manifest create "ghcr.io/scip-code/scip-go:$TAG" "$AMD64" "$ARM64"
            docker manifest push "ghcr.io/scip-code/scip-go:$TAG"
          done

  publish-release:
    needs: [create-release, binaries, docker-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.create-release.outputs.version }}" --repo "${{ github.repository }}" --draft=false
